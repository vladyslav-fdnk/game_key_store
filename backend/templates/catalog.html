<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Key Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 16px;
        }
        .header {
            text-align: center;
            padding: 12px 0;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 20px; color: #38bdf8; }
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }
        .game-card {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }
        .game-card:active { transform: scale(0.97); }
        .game-img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            background: #020617;
        }
        .game-info {
            padding: 8px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .game-title { font-weight: 600; font-size: 13px; line-height: 1.3; margin-bottom: 4px; }
        .game-price { color: #fbbf24; font-size: 13px; font-weight: 700; margin: 4px 0; }
        .game-status { font-size: 11px; color: #94a3b8; margin-bottom: 6px; }
        .buy-btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
        }
        .buy-btn.disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }
        .loading { text-align: center; padding: 40px; color: #64748b; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 Игры в наличии</h1>
    </div>
    <div class="catalog-grid" id="catalog">
        <div class="loading">Загрузка...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const BASE_URL = window.location.origin;

        async function loadGames() {
            const res = await fetch(`${BASE_URL}/api/games/`, {
    headers: { "ngrok-skip-browser-warning": "true" }
});
            const games = await res.json();
            const grid = document.getElementById("catalog");
            grid.innerHTML = "";

            games.forEach(game => {
                const available = game.keys_available > 0;
                const card = document.createElement("div");
                card.className = "game-card";
                card.innerHTML = `
                    ${game.image_url
                        ? `<img class="game-img" src="${game.image_url}" alt="${game.title}">`
                        : `<div class="game-img"></div>`
                    }
                    <div class="game-info">
                        <div>
                            <div class="game-title">${game.title}</div>
                            <div class="game-price">⭐ ${game.price_stars} Stars</div>
                            <div class="game-status">${available ? `✅ ${game.keys_available} шт.` : "❌ Нет в наличии"}</div>
                        </div>
                        <button
                            class="buy-btn ${available ? "" : "disabled"}"
                            onclick="${available ? `buyGame(${game.id})` : ""}">
                            ${available ? "Купить" : "Нет в наличии"}
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function buyGame(id) {
            tg.sendData(JSON.stringify({
                action: "buy_web_app",
                game_id: id
            }));
            tg.close();
        }

        loadGames();
    </script>
</body>
</html>
